name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Python is installed
        shell: pwsh
        run: |
          # Remove Windows 11 Microsoft Store Python stubs that intercept the 'python' command
          $stubDir = "$env:LOCALAPPDATA\Microsoft\WindowsApps"
          foreach ($stub in @("python.exe", "python3.exe")) {
            $p = Join-Path $stubDir $stub
            if (Test-Path $p) { Remove-Item $p -Force -ErrorAction SilentlyContinue }
          }

          # Check PATH first, then fall back to common install locations.
          # The runner service PATH may not reflect Python installs that happened
          # after the service started, so the filesystem check avoids reinstalling
          # on every deployment.
          $pythonExe = (Get-Command python -ErrorAction SilentlyContinue)?.Source
          if (-not $pythonExe) {
            $pythonExe = Get-ChildItem "C:\Program Files\Python3*\python.exe" `
                           -ErrorAction SilentlyContinue |
                         Sort-Object FullName -Descending |
                         Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $pythonExe) {
            Write-Host "Python not found — installing via winget..."
            winget install Python.Python.3.12 --scope machine --silent --accept-package-agreements --accept-source-agreements
            $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH", "User")
            $pythonExe = (Get-Command python -ErrorAction SilentlyContinue)?.Source
          }

          # Persist the Python directory across all subsequent steps
          Add-Content $env:GITHUB_PATH (Split-Path $pythonExe)
          & $pythonExe --version

      - name: Install dependencies
        shell: pwsh
        run: python -m pip install -r requirements.txt

      - name: Deploy script and credentials
        shell: pwsh
        env:
          CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          CREDENTIALS:    ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          $dest = "C:\git\vale-church-of-christ\youtube-stream-scheduler"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null

          Copy-Item scheduler.py -Destination $dest -Force

          # Always write client_secrets.json if the secret is populated — it never changes
          if ($env:CLIENT_SECRETS) {
            $env:CLIENT_SECRETS | Out-File -FilePath "$dest\client_secrets.json" -Encoding utf8 -NoNewline
            Write-Host "Wrote client_secrets.json"
          } else {
            Write-Host "YOUTUBE_CLIENT_SECRETS secret not set — skipping"
          }

          # Only write credentials.pkl if the secret is populated and the file doesn't already exist,
          # so the script can freely refresh the token without it being overwritten on deploy
          if ($env:CREDENTIALS -and -not (Test-Path "$dest\credentials.pkl")) {
            $bytes = [Convert]::FromBase64String($env:CREDENTIALS)
            [IO.File]::WriteAllBytes("$dest\credentials.pkl", $bytes)
            Write-Host "Wrote credentials.pkl"
          } else {
            Write-Host "credentials.pkl already exists or secret not set — skipping"
          }

      - name: Create or update scheduled task
        shell: pwsh
        run: |
          $dest      = "C:\git\vale-church-of-christ\youtube-stream-scheduler"
          $python    = (Get-Command python).Source
          $action    = New-ScheduledTaskAction -Execute $python -Argument "scheduler.py" -WorkingDirectory $dest
          $trigger   = New-ScheduledTaskTrigger -Daily -At "11:00PM"
          $settings  = New-ScheduledTaskSettingsSet -ExecutionTimeLimit (New-TimeSpan -Hours 1)
          $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest
          Register-ScheduledTask -TaskName "YouTube Stream Scheduler" -Action $action -Trigger $trigger -Settings $settings -Principal $principal -Force | Out-Null
          Write-Host "Scheduled task created/updated"
